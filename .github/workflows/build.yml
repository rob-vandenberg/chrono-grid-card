name: Build

on:
  push:
    branches:
      - main
    paths:
      - 'src/chrono-grid-card.js'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(grep -o "CARD_VERSION = '[^']*'" src/chrono-grid-card.js | sed "s/CARD_VERSION = '//;s/'//")" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: yarn install

      - name: Build
        run: yarn build

      - name: Commit built file
        uses: EndBug/add-and-commit@v9
        with:
          add: '["dist/chrono-grid-card.js"]'
          message: "Auto-build minified JS from source v${{ steps.version.outputs.version }}"
